name: agents

include:
  - path: agent-templates.yml

services:

  9router:
    image: decolua/9router:latest
    profiles: [agents, core]
    container_name: 9router
    extends: default
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      JWT_SECRET: ${ROUTER_JWT_SECRET}
      INITIAL_PASSWORD: ${ROUTER_INITIAL_PASSWORD}
      API_KEY_SECRET: ${ROUTER_API_KEY_SECRET}
      MACHINE_ID_SALT: ${ROUTER_MACHINE_ID_SALT}
    volumes:
      - ${CONFIG}/9router:/app/data
    labels:
      traefik.enable: "true"
      traefik.http.services.9router.loadbalancer.server.port: "20128"

  ollama:
    container_name: ollama
    profiles: [agents, core]
    extends: gpu
    build:
      context: ./config/ollama
      dockerfile: Dockerfile.vanilla
    environment:
      OLLAMA_HOST: 0.0.0.0
      DISABLE_PROXY: true
    volumes:
      - ${CONFIG}/ollama:/root/.ollama
      - "./config/ollama/tools:/root/.ollama/tools"
    ports:
      - "11434:11434"
    labels:
      traefik.enable: "true"
      # 1. Router & Service for Ollama Plus Proxy (Port 11435)
      traefik.http.routers.ollama-proxy.rule: "Host(`ollama-plus.${DOMAIN}`)"
      traefik.http.routers.ollama-proxy.service: "ollama-proxy"
      traefik.http.services.ollama-proxy.loadbalancer.server.port: "11435"

      # 2. Router & Service for Vanilla Ollama (Port 11434)
      traefik.http.routers.ollama-vanilla.rule: "Host(`ollama.${DOMAIN}`)"
      traefik.http.routers.ollama-vanilla.service: "ollama-vanilla"
      traefik.http.services.ollama-vanilla.loadbalancer.server.port: "11434"

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-gateway
    profiles: [agents, claw]
    extends: agent_vols_gpu
    build:
      context: config/openclaw
      dockerfile: Dockerfile
    environment:
      TERM: xterm-256color
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      OPENCLAW_DISABLE_BONJOUR: ${OPENCLAW_DISABLE_BONJOUR:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_METRICS_ENDPOINT: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-}
      OTEL_SEMCONV_STABILITY_OPT_IN: ${OTEL_SEMCONV_STABILITY_OPT_IN:-}
      OPENCLAW_OTEL_PRELOADED: ${OPENCLAW_OTEL_PRELOADED:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      # TZ: ${OPENCLAW_TZ:-UTC}
      ## KEYS
      ROUTER_API_KEY: ${ROUTER_API_KEY}
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      ## Discord
      OPENCLAW_DISCORD_TOKEN: ${OPENCLAW_DISCORD_TOKEN:-}
      USER_DISCORD_ID:
      DISCORD_CHANNEL_GENERAL: ${DISCORD_CHANNEL_GENERAL}
      DISCORD_CHANNEL_COMMS: ${DISCORD_CHANNEL_COMMS}
      DISCORD_CHANNEL_NORTHSTAR: ${DISCORD_CHANNEL_PM}
      DISCORD_CHANNEL_ADMIN: ${DISCORD_CHANNEL_ADMIN}
      DISCORD_CHANNEL_CODE: ${DISCORD_CHANNEL_CODE}
      DISCORD_USER_ID_PM: ${DISCORD_USER_ID_PM}
      DISCORD_BOT_PM_TOKEN: ${DISCORD_BOT_PM_TOKEN}
      DISCORD_USER_ID_CODER: ${DISCORD_USER_ID_CODER}
      DISCORD_BOT_CODER_TOKEN: ${DISCORD_BOT_CODER_TOKEN}
      DISCORD_USER_ID_ADMIN: ${DISCORD_USER_ID_ADMIN}
      DISCORD_BOT_ADMIN_TOKEN: ${DISCORD_BOT_ADMIN_TOKEN}
      # Paths
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      PATH: /home/node/.local/bin:/home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      # Defaults:
      # OPENCLAW_STATE_DIR: /home/node/.openclaw
      # OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      # OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      # OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_CONFIG_DIR: /home/node/conf
      OPENCLAW_CONFIG_PATH: /home/node/conf/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/state
      OPENCLAW_WORKSPACE_DIR: /workspace
    volumes:
      - "./config/openclaw/conf:/home/node/conf"
      - "${OPENCLAW_CONFIG_DIR}/state:/home/node/state"
      - "${OPENCLAW_AUTH_PROFILE_SECRET_DIR}:/home/node/.config/openclaw"
      - "${OPENCLAW_CONFIG_DIR}/npm-global:/home/node/.npm-global"
      - "${OPENCLAW_CONFIG_DIR}/bin:/home/node/.local/bin"
      - "${OPENCLAW_CONFIG_DIR}/cache:/home/node/.cache"
      # - "${WORKSPACE_DIR}:/workspace:rw"
      # - "${DATA_PATH}:/data:rw"
      # - "${WIKI_PATH}:/wiki:rw"
      # - "${PROD_PATH}:/data/production:ro"
      # - "${VAULT_PATH}:/data/vault:ro"
    init: true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      traefik.enable: "true"
      traefik.http.routers.openclaw.rule: "Host(`openclaw.${DOMAIN}`) || Host(`claw.${DOMAIN}`)"
      traefik.http.routers.openclaw.middlewares: "openclaw-auth"
      traefik.http.routers.openclaw.service: "openclaw"
      traefik.http.services.openclaw.loadbalancer.server.port: "18789"
      # Trusted proxy authentication middleware (inject user header)
      traefik.http.middlewares.openclaw-auth.headers.customrequestheaders.X-Forwarded-User: "admin@${DOMAIN}"
      traefik.http.routers.clawbrowser.rule: "Host(`openclaw-browser.${DOMAIN}`)"
      traefik.http.routers.clawbrowser.service: "clawbrowser"
      traefik.http.services.clawbrowser.loadbalancer.server.port: "3000"

  openclaw-browser:
    container_name: openclaw-browser
    profiles: [agents, claw]
    extends: browser
    network_mode: "service:openclaw-gateway"
    volumes:
      - "${CONFIG}/openclaw/browser-profile/:/config"
    depends_on:
      - openclaw-gateway

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    container_name: openclaw-cli
    profiles: [temp]
    extends: agent_volumes
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATH: /home/node/.local/bin:/home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ##KEYS
      ROUTER_API_KEY: ${ROUTER_API_KEY}
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_DISCORD_TOKEN: ${OPENCLAW_DISCORD_TOKEN:-}
    volumes:
      - "${OPENCLAW_CONFIG_DIR}:/home/node/.openclaw"
      - "${OPENCLAW_AUTH_PROFILE_SECRET_DIR:-${HOME:-/tmp}/.openclaw-auth-profile-secrets}:/home/node/.config/openclaw"
      - "${OPENCLAW_CONFIG_DIR}/npm-global:/home/node/.npm-global"
      - "${OPENCLAW_CONFIG_DIR}/bin:/home/node/.local/bin"
      - "${OPENCLAW_CONFIG_DIR}/cache:/home/node/.cache"
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

