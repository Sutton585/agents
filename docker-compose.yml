name: agents

include:
  - path: agent-templates.yml

services:

  9router:
    image: decolua/9router:latest
    profiles: [agents, core]
    container_name: 9router
    extends: default
    environment:
      DATA_DIR: /app/data
      PORT: 20128
      JWT_SECRET: ${ROUTER_JWT_SECRET}
      INITIAL_PASSWORD: ${ROUTER_INITIAL_PASSWORD}
      API_KEY_SECRET: ${ROUTER_API_KEY_SECRET}
      MACHINE_ID_SALT: ${ROUTER_MACHINE_ID_SALT}
    volumes:
      - ${CONFIG}/9router:/app/data
    labels:
      traefik.enable: "true"
      traefik.http.services.9router.loadbalancer.server.port: "20128"

  ollama:
    container_name: ollama
    profiles: [agents, core]
    extends: gpu
    build:
      context: ./config/ollama
      dockerfile: Dockerfile.vanilla
    environment:
      OLLAMA_HOST: 0.0.0.0
      DISABLE_PROXY: true
    volumes:
      - ${CONFIG}/ollama:/root/.ollama
      - "./config/ollama/tools:/root/.ollama/tools"
    ports:
      - "11434:11434"
    labels:
      traefik.enable: "true"
      # 1. Router & Service for Ollama Plus Proxy (Port 11435)
      traefik.http.routers.ollama-proxy.rule: "Host(`ollama-plus.${DOMAIN}`)"
      traefik.http.routers.ollama-proxy.service: "ollama-proxy"
      traefik.http.services.ollama-proxy.loadbalancer.server.port: "11435"

      # 2. Router & Service for Vanilla Ollama (Port 11434)
      traefik.http.routers.ollama-vanilla.rule: "Host(`ollama.${DOMAIN}`)"
      traefik.http.routers.ollama-vanilla.service: "ollama-vanilla"
      traefik.http.services.ollama-vanilla.loadbalancer.server.port: "11434"

  job-ferret:
    profiles: [agents, core]
    user: "${PUID:-1000}:${PGID:-1000}"
    build:
      context: ./config/job-ferret-mvp
      dockerfile: Dockerfile
    container_name: job-ferret-mvp
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TZ=${TZ:-America/New_York}
      - DATA_DIR=/app/data # Optional: override the data directory
      # Report verbosity configuration (omits full description body if false)
      - VERBOSE_REPORT=${VERBOSE_REPORT:-false}
      # Preview verbosity for each listing
      - PREVIEW_DUTIES=${PREVIEW_DUTIES:-1} # default: one sentence on job duties
      - PREVIEW_TECH=${PREVIEW_TECH:-1}     # default: one sentence on tech reqs/stack
      - PREVIEW_EXP=${PREVIEW_EXP:-1}       # default: one sentence on experience desired
    #ports:
      # API is accessible at http://<your-server-ip>:8000
      #- "${HOST_PORT:-8000}:8000"
    volumes:
      # All output (SQLite DB + Markdown files) goes here on the host.
      # Change the left-hand side to any absolute path you prefer, e.g.:
      #   /mnt/data/job-ferret:/app/data
      - ${CONFIG}/job-ferret:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    labels:
      traefik.enable: "true"
      traefik.http.services.job-ferret-mvp.loadbalancer.server.port: "3333"

  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    container_name: openclaw-gateway
    profiles: [agents, claw]
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    extends: agent_vols_gpu
    build:
      context: config/openclaw
      dockerfile: Dockerfile
    environment:
      TERM: xterm-256color
      OPENCLAW_LOG_LEVEL: trace
      # Paths
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      PATH: /home/node/.local/bin:/home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      # Defaults:
      # OPENCLAW_STATE_DIR: /home/node/.openclaw
      # OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      # OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      # OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_CONFIG_DIR: /home/node/conf
      OPENCLAW_CONFIG_PATH: /home/node/conf/openclaw.json
      OPENCLAW_STATE_DIR: /home/node/state
      OPENCLAW_WORKSPACE_DIR: /workspace
    volumes:
      - "./config/openclaw/conf:/home/node/conf"
      - "${CONFIG}/openclaw/state:/home/node/state"
      - "${OPENCLAW_AUTH_PROFILE_SECRET_DIR}:/home/node/.config/openclaw"
      - "${CONFIG}/openclaw/npm-global:/home/node/.npm-global"
      # - "${CONFIG}/openclaw/bin:/home/node/.local/bin"
      - "${CONFIG}/openclaw/cache:/home/node/.cache"
    init: true
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      traefik.enable: "true"
      traefik.http.routers.openclaw.rule: "Host(`openclaw.${DOMAIN}`) || Host(`claw.${DOMAIN}`)"
      traefik.http.routers.openclaw.middlewares: "openclaw-auth"
      traefik.http.routers.openclaw.service: "openclaw"
      traefik.http.services.openclaw.loadbalancer.server.port: "18789"
      # Trusted proxy authentication middleware (inject user header)
      traefik.http.middlewares.openclaw-auth.headers.customrequestheaders.X-Forwarded-User: "admin@${DOMAIN}"
      traefik.http.routers.clawbrowser.rule: "Host(`openclaw-browser.${DOMAIN}`)"
      traefik.http.routers.clawbrowser.service: "clawbrowser"
      traefik.http.services.clawbrowser.loadbalancer.server.port: "3000"

  openclaw-browser:
    container_name: openclaw-browser
    profiles: [agents, claw]
    extends: browser
    network_mode: "service:openclaw-gateway"
    volumes:
      - "${CONFIG}/openclaw/browser-profile/:/config"
    depends_on:
      - openclaw-gateway

  openclaw-cli:
    image: ${OPENCLAW_IMAGE:-openclaw:local}
    network_mode: "service:openclaw-gateway"
    container_name: openclaw-cli
    profiles: [temp]
    extends: agent_volumes
    environment:
      HOME: /home/node
      OPENCLAW_HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_STATE_DIR: /home/node/.openclaw
      OPENCLAW_CONFIG_PATH: /home/node/.openclaw/openclaw.json
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
      TZ: ${OPENCLAW_TZ:-UTC}
      NPM_CONFIG_PREFIX: /home/node/.npm-global
      PATH: /home/node/.local/bin:/home/node/.npm-global/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      ##KEYS
      ROUTER_API_KEY: ${ROUTER_API_KEY}
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_DISCORD_TOKEN: ${OPENCLAW_DISCORD_TOKEN:-}
    volumes:
      - "${OPENCLAW_CONFIG_DIR}/state:/home/node/state"
      - "${OPENCLAW_AUTH_PROFILE_SECRET_DIR}:/home/node/.config/openclaw"
      # - "${OPENCLAW_CONFIG_DIR}/npm-global:/home/node/.npm-global"
      # - "${OPENCLAW_CONFIG_DIR}/bin:/home/node/.local/bin"
      - "${OPENCLAW_CONFIG_DIR}/cache:/home/node/.cache"
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

  hermes-gateway:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-gateway
    profiles: [agents, hermes]
    extends: agent_vols_gpu
    command: gateway run
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    environment:
      HERMES_UID: ${UID:-1000}                  # Matches host user permissions
      HERMES_GID: ${GID:-1000}
      HERMES_HOME: /opt/data
      HERMES_DASHBOARD: 1                       # Enables the built-in web dashboard
      HERMES_DASHBOARD_HOST: 0.0.0.0
      HERMES_DASHBOARD_INSECURE: 1
      BROWSER_CDP_URL: ws://127.0.0.1:9222      # Connects to the headful browser sidecar
      OBSIDIAN_VAULT_PATH: /data/vault/obsidian/current
      WIKI_PATH: /wiki
      API_SERVER_ENABLED: true                  # Enables the OpenAI-compatible API
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_KEY: ${HERMES_API_KEY}         # Add this variable to your root .env
      API_SERVER_CORS_ORIGINS: "*"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN:-}
      DISCORD_ALLOWED_USERS: ${DISCORD_ALLOWED_USERS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      GATEWAY_ALLOW_ALL_USERS: ${GATEWAY_ALLOW_ALL_USERS:-}
    volumes:
      - "${CONFIG}/hermes:/opt/data"
      - "./config/hermes-agent/config.yaml:/opt/data/config.yaml"
      - "./config/hermes-agent/SOUL.md:/opt/data/SOUL.md"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      traefik.enable: "true"
      # traefik.http.routers.hermes.rule: "Host(`hermes.${DOMAIN}`)"
      traefik.http.routers.hermes.service: "hermes"
      traefik.http.services.hermes.loadbalancer.server.port: "9119"
      traefik.http.routers.hermesbrowser.rule: "Host(`hermes-browser.${DOMAIN}`)"
      traefik.http.routers.hermesbrowser.service: "hermesbrowser"
      traefik.http.services.hermesbrowser.loadbalancer.server.port: "3000"

  hermes-browser:
    container_name: hermes-browser
    profiles: [agents, hermes]
    extends: browser
    network_mode: "service:hermes-gateway"       # Shares network stack for loopback CDP (9222)
    volumes:
      - "${CONFIG}/hermes-agent:/opt/data"
      - "${CONFIG}/hermes-agent/browser-profile/:/config"
      # - "${CONFIG}/openclaw/.chromium-profile/:/config"
    depends_on:
      - hermes-gateway
